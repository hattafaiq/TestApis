<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ESP32 Monitoring</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial;
      background:#f4f7fb;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      width:100%;
      max-width:700px;
      text-align:center;
    }

    h1{
      margin-bottom:30px;
      color:#333;
    }

    .cards{
      display:flex;
      gap:20px;
      justify-content:center;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:250px;
      padding:30px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .title{
      font-size:20px;
      color:#666;
      margin-bottom:15px;
    }

    .value{
      font-size:48px;
      font-weight:bold;
      color:#2196f3;
    }

    .unit{
      font-size:20px;
      color:#888;
    }

    .footer{
      margin-top:30px;
      color:#666;
    }

  </style>
</head>
<body>

<div class="container">

  <h1>Monitoring ESP32</h1>

  <div class="cards">

    <div class="card">
      <div class="title">Suhu</div>
      <div>
        <span class="value" id="suhu">0</span>
        <span class="unit">°C</span>
      </div>
    </div>

    <div class="card">
      <div class="title">Kelembapan</div>
      <div>
        <span class="value" id="kelembapan">0</span>
        <span class="unit">%</span>
      </div>
    </div>

  </div>

  <div class="footer" id="status">
    Menunggu data...
  </div>

</div>

<script>

  const firebaseConfig = {
    databaseURL:
      "https://hallojeck123-default-rtdb.firebaseio.com"
  };

  firebase.initializeApp(firebaseConfig);

  const db = firebase.database();

  db.ref("sensor").on("value", (snapshot) => {

    const data = snapshot.val();

    if(data){

      document.getElementById("suhu").innerHTML =
        data.suhu;

      document.getElementById("kelembapan").innerHTML =
        data.kelembapan;

      document.getElementById("status").innerHTML =
        "Data realtime berhasil diterima";
    }
  });

</script>

</body>
</html>
