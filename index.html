<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ESP32 Monitoring</title>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <style>

    body{
      font-family:Arial;
      background:#f4f7fb;
      text-align:center;
      padding:40px;
    }

    h1{
      margin-bottom:30px;
    }

    .container{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .card{
      background:white;
      width:220px;
      padding:30px;
      border-radius:20px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .title{
      font-size:20px;
      margin-bottom:15px;
      color:#666;
    }

    .value{
      font-size:45px;
      color:#2196f3;
      font-weight:bold;
    }

    .button-area{
      margin-top:40px;
    }

    button{
      padding:15px 30px;
      border:none;
      border-radius:10px;
      font-size:18px;
      cursor:pointer;
      margin:10px;
      color:white;
    }

    .on{
      background:#4caf50;
    }

    .off{
      background:#f44336;
    }

    #status{
      margin-top:20px;
      color:#555;
    }

  </style>
</head>
<body>

<h1>Monitoring ESP32</h1>

<div class="container">

  <div class="card">
    <div class="title">Suhu</div>
    <div>
      <span class="value" id="suhu">0</span> °C
    </div>
  </div>

  <div class="card">
    <div class="title">Kelembapan</div>
    <div>
      <span class="value" id="kelembapan">0</span> %
    </div>
  </div>

</div>

<div class="button-area">

  <button class="on" onclick="ledOn()">
    LED ON
  </button>

  <button class="off" onclick="ledOff()">
    LED OFF
  </button>

</div>

<div id="status">
  Menunggu data...
</div>

<script>

const firebaseConfig = {
  databaseURL:
    "https://esp32-monitor-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();


// realtime sensor
db.ref("sensor").on("value", (snapshot)=>{

  const data = snapshot.val();

  if(data){

    document.getElementById("suhu").innerHTML =
      data.suhu;

    document.getElementById("kelembapan").innerHTML =
      data.kelembapan;

    document.getElementById("status").innerHTML =
      "Realtime connected";
  }
});


// tombol ON
function ledOn(){

  db.ref("control").set({
    led: true
  });

  alert("LED ON");
}


// tombol OFF
function ledOff(){

  db.ref("control").set({
    led: false
  });

  alert("LED OFF");
}

</script>

</body>
</html>
